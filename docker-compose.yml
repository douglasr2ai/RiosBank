services:
  backend:
    build: ./backend
    expose:
      - "8000"
    volumes:
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    networks:
      - internal

  frontend:
    build: ./frontend
    expose:
      - "80"
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - internal
      - dokploy-network

networks:
  internal:
  dokploy-network:
    external: true
